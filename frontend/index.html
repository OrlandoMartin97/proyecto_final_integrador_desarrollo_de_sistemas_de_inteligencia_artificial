<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎓 IA Riesgo Académico</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css">
</head>

<body>

    <div class="background-animation"></div>

    <div class="container">

        <div class="header">
            <div class="icon">🎓</div>
            <h1>Sistema de Predicción</h1>
            <h2>Riesgo Académico Estudiantil</h2>
            <p class="subtitle">Análisis predictivo con Inteligencia Artificial</p>
        </div>

        <div class="form-section">
            
            <div class="input-group">
                <label for="age">👤 Edad del estudiante</label>
                <input id="age" type="number" placeholder="Ej: 20" min="16" max="100">
            </div>

            <div class="input-group">
                <label for="admission_grade">📝 Nota de ingreso</label>
                <input id="admission_grade" type="number" placeholder="Ej: 130" min="0" max="200" step="0.1">
            </div>

            <div class="input-group">
                <label for="scholarship">💰 Beca académica</label>
                <select id="scholarship">
                    <option value="1">✅ Sí, tiene beca</option>
                    <option value="0">❌ No tiene beca</option>
                </select>
            </div>

            <div class="input-group">
                <label for="approved">✔️ Cursos aprobados</label>
                <input id="approved" type="number" placeholder="Ej: 10" min="0" max="50">
            </div>

            <div class="input-group">
                <label for="avg_grade">📊 Promedio académico</label>
                <input id="avg_grade" type="number" placeholder="Ej: 14.5" min="0" max="20" step="0.1">
            </div>

            <button onclick="predecir()" class="predict-btn">
                <span class="btn-icon">🤖</span>
                <span class="btn-text">Analizar con IA</span>
            </button>

        </div>

        <div id="resultado-container" class="resultado-container hidden">
            <div class="resultado-header">Resultado del Análisis</div>
            <div id="resultado" class="resultado"></div>
        </div>

    </div>

    <footer class="footer">
        <p>Desarrollado con TensorFlow & Flask | Redes Neuronales Profundas 🧠</p>
    </footer>

    <script src="./app.js"></script>

</body>
</html>
